# Generic values - parametrized for runtime/cloud
replicaCount: 2

image:
  repository: ghcr.io/yourorg/myapp
  pullPolicy: Always
  tag: "dev"

service:
  type: LoadBalancer
  port: 80

runtime: "python"  # java/node/python
deploymentType: "k8s"

# Runtime-specific ports/resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: DB_HOST
    value: "postgres"
