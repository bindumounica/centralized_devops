name: CD - Manual Prod Deploy

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: cd terraform && terraform init -var-file=../environments/${{ inputs.env }}.tfvars.example

      - name: Terraform Plan
        run: cd terraform && terraform plan -var-file=../environments/${{ inputs.env }}.tfvars

      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve -var-file=../environments/${{ inputs.env }}.tfvars

      - name: Teams Notification
        if: always()
        uses: microsoft/teams-webhook-action@v0.2.0  # Fixed Teams
        env:
          TEAMS_WEBHOOK_URI: ${{ secrets.TEAMS_WEBHOOK_URI }}
        with:
          message: |
            **Prod Deploy ${{ job.status }}** ${{ github.repository }} (${{ github.sha }}) by ${{ github.actor }}
