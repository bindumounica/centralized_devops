name: CI - Build/Test/Deploy Dev/Staging

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image (generic)
        uses: docker/build-push-action@v5
        with:
          context: examples/${{ vars.RUNTIME || 'python' }}-app/
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/myapp:dev

      - name: Test app (runtime-specific)
        run: |
          # Generic tests e.g. pytest for python, maven test for java
          cd examples/${{ vars.RUNTIME }}-app
          docker run myapp:dev pytest  # Adapt per runtime

  deploy-dev-staging:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging]
    environment: ${{ matrix.env }}  # GitHub env protections
    steps:
      - uses: actions/checkout@v4

      - name: Terraform deploy
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - run: terraform init -var-file=environments/${{ matrix.env }}.tfvars
      - run: terraform plan -var-file=environments/${{ matrix.env }}.tfvars
      - run: terraform apply -auto-approve -var-file=environments/${{ matrix.env }}.tfvars
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # GCP/Azure equiv secrets

