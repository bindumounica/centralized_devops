route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: slack-team

receivers:
- name: slack-team
  slack_configs:
  - api_url: 'https://hooks.slack.com/services/YOUR/HOOK/URL'
    channel: '#devops-alerts'
    text: |-
      :rotating_light: *{{ .Status | toUpper }}* :{{ .Status | toUpper }}: {{ .GroupLabels.app }} Alert
      Value: {{ .Value }}
      Summary: {{ .Annotations.summary }}
